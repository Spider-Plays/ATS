name: Deploy QA Worker

on:
  push:
    branches:
      - qa
    paths:
      - 'src/**'
      - 'public/**'
      - 'worker/**'
      - 'wrangler.toml'
      - 'wrangler.qa.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - 'tsconfig*.json'
      - 'tailwind.config.*'
      - 'postcss.config.*'
      - 'index.html'
      - 'scripts/build-client.mjs'
      - 'scripts/strip-dist-redirects.mjs'
      - '.github/workflows/deploy-qa-worker.yml'

concurrency:
  group: deploy-qa-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy ats-qa to Cloudflare Workers
        run: npm run deploy:worker:qa
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
