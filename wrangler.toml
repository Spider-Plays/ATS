name = "ats"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./dist"

# Default vars apply to local dev and production deployments.
[vars]
API_ORIGIN = "https://stitch-ats.onrender.com"

# Preview deployments (non-production branches) — Cloudflare's "dev" stage.
# Point at a separate Render preview service when you have one.
[env.preview.vars]
API_ORIGIN = "https://stitch-ats.onrender.com"

[env.production.vars]
API_ORIGIN = "https://stitch-ats.onrender.com"
