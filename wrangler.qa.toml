# QA worker only (qa.stitch-ats.in). Use with: npx wrangler deploy --config wrangler.qa.toml
# Cloudflare Workers Builds on the ats-qa project should use this file (not wrangler.toml + --env qa).
name = "ats-qa"
compatibility_date = "2024-09-23"
main = "./worker/index.js"

[vars]
API_ORIGIN = "https://ats-0dtj.onrender.com"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
