components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT from POST /api/auth/login (~7 day lifetime)
    integrationApiKey:
      type: apiKey
      in: header
      name: X-Integration-Api-Key
      description: M365_INTEGRATION_API_KEY env var
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
        code:
          type: string
      required:
        - error
    UserRole:
      type: string
      enum:
        - SUPER_ADMIN
        - ADMIN
        - HR_HEAD
        - HR_MANAGER
        - FINANCE_HEAD
        - RECRUITER
        - TEAM_LEAD
        - HIRING_MANAGER
        - ACCOUNT_MANAGER
        - INTERVIEWER
        - CANDIDATE
        - VENDOR
        - EMPLOYEE
    UserStatus:
      type: string
      enum:
        - ACTIVE
        - DISABLED
    ThemePreference:
      type: string
      enum:
        - light
        - dark
        - system
    User:
      type: object
      properties:
        uid:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
        tags:
          type: array
          items:
            type: string
        themePreference:
          $ref: "#/components/schemas/ThemePreference"
        createdAt:
          type: string
          format: date-time
        avatar:
          type: string
        phoneNumber:
          type: string
        address:
          type: string
        resumeUrl:
          type: string
        status:
          $ref: "#/components/schemas/UserStatus"
        authProvider:
          type: string
        department:
          type: string
        lastLogin:
          type: string
