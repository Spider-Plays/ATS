[auth]
allowed_redirect_urls = ["http://localhost:3000", "http://localhost:3000/login", "http://localhost:3000/portal/login", "http://localhost:3000/portal/signup", "http://localhost:3000/referral/login", "https://stitch-ats.insforge.site", "https://stitch-ats.insforge.site/login", "https://stitch-ats.insforge.site/portal/login", "https://stitch-ats.insforge.site/portal/signup", "https://stitch-ats.insforge.site/referral/login"]
require_email_verification = false
verify_email_method = "code"
reset_password_method = "code"
disable_signup = false

[auth.password]
min_length = 8
require_number = false
require_lowercase = false
require_uppercase = false
require_special_char = false

[auth.smtp]
enabled = false
host = ""
port = 465
username = ""
sender_email = ""
sender_name = ""
min_interval_seconds = 60

[storage]
max_file_size_mb = 50

[realtime]
retention_days = 0

[schedules]
retention_days = 7
